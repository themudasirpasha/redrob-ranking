methodology_summary: >
  Hybrid scoring system using sentence-transformers embeddings for semantic 
  similarity between JD and candidates. Combined with skills matching, 
  experience quality scoring, and behavioral signals from redrob_signals. 
  Filtered 1 lakh candidates to ~7000 relevant ones before ranking.
  Final score = 0.40 x Semantic + 0.25 x Skills + 0.20 x Experience + 0.15 x Availability.
